spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/habitlink?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
    username: root
    password: ${MYSQL_PASSWORD:123456}

app:
  cors:
    allowed-origins:
      - http://localhost:5173
      - http://localhost:5174
      - http://localhost:5175
      - http://127.0.0.1:5173
      - http://127.0.0.1:5174
      - http://127.0.0.1:5175

habitlink:
  token:
    secret: ${HABITLINK_TOKEN_SECRET:dev-only-habitlink-secret}
    expire-days: ${HABITLINK_TOKEN_EXPIRE_DAYS:7}
